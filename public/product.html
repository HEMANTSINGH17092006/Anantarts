<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Anant Arts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .product-detail-container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem;
    }

    @media (max-width: 900px) {
      .product-detail-container {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }

    /* Images Zoom and Gallery styling */
    .product-gallery {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .main-image-frame {
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid var(--primary-gold-border);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-cream-dark);
      position: relative;
      cursor: zoom-in;
    }

    .main-image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.1s ease-out;
    }

    .thumbnails-grid {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .thumb-wrapper {
      width: 70px;
      height: 70px;
      border: 1px solid #CCC;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-cream-dark);
      transition: var(--transition-fast);
    }

    .thumb-wrapper.active,
    .thumb-wrapper:hover {
      border-color: var(--primary-gold);
      box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }

    .thumb-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Info Column styling */
    .product-info-col {
      display: flex;
      flex-direction: column;
    }

    .p-meta-category {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-family: var(--font-heading);
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .p-title-text {
      font-size: 2.2rem;
      color: var(--luxury-maroon);
      margin-bottom: 0.75rem;
      line-height: 1.25;
    }

    .p-price-row {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin: 1rem 0;
    }

    .p-final-price {
      font-size: 2rem;
      color: var(--luxury-maroon);
      font-weight: bold;
    }

    .p-compare-price {
      font-size: 1.25rem;
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .p-stock-flag {
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .specs-table {
      width: 100%;
      border-collapse: collapse;
      margin: 2rem 0;
      font-size: 0.9rem;
    }

    .specs-table td {
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }

    .specs-table td:first-child {
      font-weight: bold;
      color: var(--text-muted);
      width: 40%;
    }

    .purchase-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 2rem;
    }

    .qty-selector {
      display: flex;
      border: 1px solid #CCC;
      border-radius: var(--radius-sm);
      height: 46px;
      overflow: hidden;
      background: white;
    }

    .qty-selector input {
      width: 50px;
      text-align: center;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .qty-nav {
      width: 30px;
      background: var(--bg-cream-dark);
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .qty-nav:hover {
      background: #EAEAEA;
    }

    .btn-buy {
      height: 46px;
      flex-grow: 1;
      background: var(--gold-gradient);
      color: var(--text-dark);
      border: none;
      font-weight: bold;
      font-family: var(--font-heading);
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: var(--transition-normal);
    }

    .btn-buy:hover {
      background: var(--luxury-gradient);
      color: var(--text-light);
      box-shadow: var(--shadow-maroon);
    }

    /* Review Area */
    .reviews-section {
      max-width: 1200px;
      margin: 4rem auto;
      padding: 0 2rem;
      border-top: 1px solid rgba(0,0,0,0.05);
      padding-top: 3rem;
    }

    .reviews-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 4rem;
    }

    @media (max-width: 900px) {
      .reviews-grid {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
    }
  </style>
</head>
<body id="product-page">

  <!-- Header -->
  <header id="main-header"></header>

  <!-- Product Detail Section -->
  <main class="product-detail-container">
    
    <!-- Gallery Column -->
    <div class="product-gallery">
      <div class="main-image-frame">
        <img id="p-main-image" src="" alt="Premium God Idol">
      </div>
      <div class="thumbnails-grid" id="p-thumbnails">
        <!-- Dyn Hydrated -->
      </div>
    </div>

    <!-- Info details Column -->
    <div class="product-info-col">
      <span class="p-meta-category" id="p-category">Idols</span>
      <h1 class="p-title-text" id="p-title">Divine Electroplated Sculpture</h1>
      
      <div class="rating-stars" style="color:#FFC107;"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i> <span style="color:#666; margin-left:5px;">(5.0 out of 5 stars based on verified reviews)</span></div>

      <div class="p-price-row">
        <span class="p-final-price" id="p-price">₹0</span>
        <span class="p-compare-price" id="p-compare-price">₹0</span>
      </div>

      <div class="p-stock-flag" id="p-stock-alert">Checking availability...</div>

      <p id="p-desc" style="color:#444; font-size:1rem; line-height:1.7; margin-bottom:1.5rem;"></p>

      <!-- Specifications Sheet -->
      <table class="specs-table">
        <tr>
          <td>Material Details</td>
          <td id="p-material">Electroplated Brass</td>
        </tr>
        <tr>
          <td>Dimensions (H x W x L)</td>
          <td id="p-dimensions">N/A</td>
        </tr>
        <tr>
          <td>Sculpture Weight</td>
          <td id="p-weight">N/A</td>
        </tr>
        <tr>
          <td>Product SKU</td>
          <td id="p-sku">N/A</td>
        </tr>
      </table>

      <!-- Qty and Add to buttons -->
      <div class="purchase-actions">
        <div class="qty-selector">
          <button class="qty-nav" onclick="const input = document.getElementById('p-qty'); if(input.value > 1) input.value--">-</button>
          <input type="text" id="p-qty" value="1" readonly>
          <button class="qty-nav" onclick="document.getElementById('p-qty').value++">+</button>
        </div>
        <button class="btn-add-cart" id="p-add-cart-btn" onclick="addProductToCart()" style="height:46px; width:200px;">Add to Cart 🛒</button>
        <button class="btn-buy" id="p-buy-now-btn" onclick="buyProductNow()">Buy Now 🏵️</button>
      </div>

    </div>

  </main>

  <!-- Product Reviews section -->
  <section class="reviews-section">
    <h2 style="font-family:var(--font-heading); margin-bottom:2rem; color:var(--luxury-maroon);">Devotee Reviews</h2>
    
    <div class="reviews-grid">
      
      <!-- List reviews -->
      <div>
        <div id="reviews-list">
          <!-- Dyn hydrated -->
        </div>
      </div>

      <!-- Add review Form -->
      <div class="admin-card" style="border:1px solid var(--primary-gold-border); height:fit-content;">
        <h3 style="margin-bottom:1rem; font-family:var(--font-heading);">Submit a Review</h3>
        <form onsubmit="submitReview(event)">
          <div class="admin-form-group">
            <label class="admin-form-label">Full Name</label>
            <input type="text" id="rev-name" class="admin-form-input" required placeholder="e.g. Ramesh Kumar">
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Email Address</label>
            <input type="email" id="rev-email" class="admin-form-input" required placeholder="e.g. ramesh@gmail.com">
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Rating</label>
            <div style="display:flex; gap:0.5rem; font-size:1.25rem;">
              <label><input type="radio" name="rev-rating" value="5" checked> ★5</label>
              <label><input type="radio" name="rev-rating" value="4"> ★4</label>
              <label><input type="radio" name="rev-rating" value="3"> ★3</label>
              <label><input type="radio" name="rev-rating" value="2"> ★2</label>
              <label><input type="radio" name="rev-rating" value="1"> ★1</label>
            </div>
          </div>
          <div class="admin-form-group" style="margin-bottom:1.5rem;">
            <label class="admin-form-label">Your Comment</label>
            <textarea id="rev-comment" class="admin-form-input" rows="4" placeholder="Share your experience regarding craftsmanship, shine, and packaging..." required></textarea>
          </div>
          <button type="submit" class="btn-add-cart" style="width:100%;">Post Review 🌸</button>
        </form>
      </div>

    </div>
  </section>

  <!-- Related Products Grid -->
  <section style="max-width:1200px; margin:5rem auto; padding:0 2rem;">
    <h2 style="font-family:var(--font-heading); text-align:center; margin-bottom:2.5rem; color:var(--luxury-maroon);">Related Divine Collections</h2>
    <div class="product-grid" id="related-products-grid">
      <!-- Hydrated -->
    </div>
  </section>

  <!-- Recently Viewed Products -->
  <section style="max-width:1200px; margin:5rem auto; padding:0 2rem;">
    <h2 style="font-family:var(--font-heading); text-align:center; margin-bottom:2.5rem; color:var(--luxury-maroon);">Recently Viewed</h2>
    <div class="product-grid" id="recent-products-grid">
      <!-- Hydrated -->
    </div>
  </section>

  <!-- Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
