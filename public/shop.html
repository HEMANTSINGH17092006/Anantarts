<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Luxury Idols - Anant Arts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .shop-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 2.5rem;
    }

    @media (max-width: 900px) {
      .shop-container {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar Filters */
    .shop-sidebar {
      background: var(--text-light);
      border-radius: var(--radius-md);
      padding: 1.75rem;
      border: 1px solid var(--primary-gold-border);
      box-shadow: var(--shadow-sm);
      height: fit-content;
    }

    .filter-widget {
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      padding-bottom: 1.5rem;
    }

    .filter-widget:last-child {
      border: none;
      margin: 0;
      padding: 0;
    }

    .filter-title {
      font-family: var(--font-heading);
      font-size: 1.05rem;
      color: var(--luxury-maroon);
      margin-bottom: 1rem;
      font-weight: bold;
    }

    .search-input-group {
      position: relative;
    }

    .search-bar {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid #CCC;
      border-radius: var(--radius-sm);
      outline: none;
    }

    .search-bar:focus {
      border-color: var(--primary-gold);
    }

    .filter-checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .filter-checkbox-label input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary-gold-hover);
    }

    .price-slider-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .price-slider {
      width: 100%;
      accent-color: var(--primary-gold-hover);
    }

    /* Sorting and Catalog Header */
    .catalog-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(200,200,200,0.2);
      padding-bottom: 1rem;
    }

    .catalog-title {
      font-size: 1.5rem;
      font-family: var(--font-heading);
      color: var(--luxury-maroon);
    }

    .sort-dropdown {
      padding: 0.5rem 1rem;
      border: 1px solid #CCC;
      border-radius: var(--radius-sm);
      outline: none;
      background-color: var(--text-light);
    }

    .sort-dropdown:focus {
      border-color: var(--primary-gold);
    }
  </style>
</head>
<body id="shop-page">

  <!-- Dynamic Header -->
  <header id="main-header"></header>

  <!-- Shop Collections Layout -->
  <main class="shop-container">
    
    <!-- Sidebar Filters -->
    <aside class="shop-sidebar">
      
      <!-- Search Filter -->
      <div class="filter-widget">
        <h4 class="filter-title">Search Idols</h4>
        <div class="search-input-group">
          <input type="text" id="shop-search-input" class="search-bar" placeholder="e.g., Ganesha, 24K...">
        </div>
      </div>

      <!-- Categories Filter -->
      <div class="filter-widget">
        <h4 class="filter-title">Filter by Deity</h4>
        <div id="filter-categories">
          <!-- Dyn Hydrated -->
        </div>
      </div>

      <!-- Price Range Filter -->
      <div class="filter-widget">
        <h4 class="filter-title">Max Price</h4>
        <div class="price-slider-wrapper">
          <input type="range" id="shop-price-range" class="price-slider shop-filter-trigger" min="5000" max="100000" step="5000" value="100000">
          <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:var(--text-muted);">
            <span>₹5,000</span>
            <strong id="price-range-val" style="color:var(--luxury-maroon);">₹100,000</strong>
          </div>
        </div>
      </div>

      <!-- Availability Filter -->
      <div class="filter-widget">
        <h4 class="filter-title">Availability</h4>
        <label class="filter-checkbox-label">
          <input type="checkbox" id="shop-stock-only" class="shop-filter-trigger">
          <span>Show In Stock Only</span>
        </label>
      </div>

    </aside>

    <!-- Products Catalog -->
    <section>
      
      <div class="catalog-header">
        <h2 class="catalog-title">Spiritual Statues</h2>
        <div style="display:flex; align-items:center; gap:1rem;">
          <span style="font-size:0.9rem; color:var(--text-muted);">Sort By:</span>
          <select id="shop-sort-select" class="sort-dropdown shop-filter-trigger">
            <option value="popularity">Best Sellers</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="latest">New Arrivals</option>
          </select>
        </div>
      </div>

      <div class="product-grid" id="shop-products-grid" style="padding-top:0;">
        <!-- Hydrated dynamically -->
      </div>

    </section>

  </main>

  <!-- Dynamic Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
