<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order Journey - Anant Arts</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .tracking-container {
      max-width: 800px;
      margin: 4rem auto;
      padding: 0 2rem;
    }

    .tracking-search-card {
      background: var(--text-light);
      border-radius: var(--radius-md);
      padding: 2.5rem;
      border: 1px solid var(--primary-gold-border);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }
  </style>
</head>
<body id="tracking-page">

  <!-- Header -->
  <header id="main-header"></header>

  <!-- Main Container -->
  <main class="tracking-container">
    
    <div class="tracking-search-card">
      <h2 style="font-family:var(--font-heading); color:var(--luxury-maroon); margin-bottom:0.75rem;">Track Your Order Journey</h2>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem;">Enter your unique Order Number (e.g., AA-1721245678) from your confirmation email/message below to check its current status.</p>

      <form id="tracking-form" style="display:flex; gap:0.5rem; max-width:500px; margin:0 auto;">
        <input type="text" id="tracking-input" class="admin-form-input" placeholder="Enter Order Number" required style="font-size:1.1rem; height:46px;">
        <button type="submit" class="btn-add-cart" style="width:140px; height:46px; border:none; margin:0;">Track 🚚</button>
      </form>
    </div>

    <!-- Results Section -->
    <div id="tracking-results">
      <!-- Dyn Hydrated by app.js -->
    </div>

  </main>

  <!-- Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
